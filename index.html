<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <main class="main">
      <article class="card">
        <img
          class="image-illustration"
          src="./images/illustration-article.svg"
          alt="Illustration image"
        />

        <div class="card-category">Learning</div>

        <time datetime="2023-12-21">Published 21 Dec 2023</time>

        <h1 class="card-title">
          <a href="#">HTML & CSS foundations</a>
        </h1>

        <p class="card-text">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>

        <div class="card-author">
          <img
            class="image-avatar"
            src="./images/image-avatar.webp"
            alt="Greg Hooper avatar"
          />

          <span class="author-name">Greg Hooper</span>
        </div>
      </article>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
